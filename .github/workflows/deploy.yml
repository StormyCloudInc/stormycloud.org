name: Build and Deploy

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats data
        env:
          STATS_BASE_URL: ${{ secrets.STATS_BASE_URL }}
        run: bash scripts/fetch-stats.sh

      - name: Compute warrant canary status
        run: bash scripts/canary-check.sh

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.8'

      - name: Build
        run: hugo --minify

      - name: Install optimization tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq webp brotli
          npm install -g csso-cli terser svgo

      - name: Optimize assets
        run: bash scripts/optimize-assets.sh public

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: stormycloud
          directory: public

      - name: Deploy to I2P server
        env:
          I2P_SERVER_SSH_KEY: ${{ secrets.I2P_SERVER_SSH_KEY }}
          I2P_SERVER_PORT: ${{ secrets.I2P_SERVER_PORT }}
          I2P_SERVER_IP: ${{ secrets.I2P_SERVER_IP }}
          I2P_SERVER_USER: ${{ secrets.I2P_SERVER_USER }}
        run: |
          eval $(ssh-agent -s)
          echo "$I2P_SERVER_SSH_KEY" | tr -d '\r' | ssh-add -
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p $I2P_SERVER_PORT -H $I2P_SERVER_IP >> ~/.ssh/known_hosts
          cd public && tar -czf ../site.tar.gz * && cd ..
          ssh -p $I2P_SERVER_PORT $I2P_SERVER_USER@$I2P_SERVER_IP "sudo rm -rf /var/www/html/*"
          scp -P $I2P_SERVER_PORT site.tar.gz $I2P_SERVER_USER@$I2P_SERVER_IP:/tmp/
          ssh -p $I2P_SERVER_PORT $I2P_SERVER_USER@$I2P_SERVER_IP "
            cd /tmp &&
            sudo tar -xzf site.tar.gz -C /var/www/html/ &&
            sudo chown -R www-data:www-data /var/www/html/ &&
            sudo chmod -R 755 /var/www/html/ &&
            rm -f site.tar.gz
          "
