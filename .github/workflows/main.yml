name: Deploy to I2P Server
on:
  push:
    branches: [ main ]

jobs:
  deploy-i2p:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        submodules: true
        fetch-depth: 0

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v2
      with:
        hugo-version: 'latest'
        extended: true

    - name: Build Hugo site
      run: hugo --config="config/config.toml" --gc --minify

    - name: Create deployment archive
      run: |
        cd public
        tar -czf ../site.tar.gz *
    - name: Deploy to I2P Server
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.I2P_SERVER_IP }}
        username: ${{ secrets.I2P_SERVER_USER }}
        key: ${{ secrets.I2P_SERVER_SSH_KEY }}
        port: ${{ secrets.I2P_SERVER_PORT }}
        script: |
          sudo rm -rf /var/www/html/*
          cd /tmp
          rm -f site.tar.gz
    - name: Copy site archive
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.I2P_SERVER_IP }}
        username: ${{ secrets.I2P_SERVER_USER }}
        key: ${{ secrets.I2P_SERVER_SSH_KEY }}
        port: ${{ secrets.I2P_SERVER_PORT }}
        source: "site.tar.gz"
        target: "/tmp/"

    - name: Extract and set permissions
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.I2P_SERVER_IP }}
        username: ${{ secrets.I2P_SERVER_USER }}
        key: ${{ secrets.I2P_SERVER_SSH_KEY }}
        port: ${{ secrets.I2P_SERVER_PORT }}
        script: |
          cd /tmp
          sudo tar -xzf site.tar.gz -C /var/www/html/
          sudo chown -R www-data:www-data /var/www/html/
          sudo chmod -R 755 /var/www/html/
          rm -f site.tar.gz
