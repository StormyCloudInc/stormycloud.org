# GitLab CI/CD - Security Scanning Only
# Run this on a schedule to scan your deployed site

stages:
  - test
  - dast
  - secret-detection

include:
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/DAST.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/SAST-IaC.gitlab-ci.yml

# Override DAST configuration
variables:
  DAST_WEBSITE: "https://stormycloud.org"

dast:
  stage: dast
  variables:
    DAST_SITE_PROFILE: "stormycloud"
    DAST_SCANNER_PROFILE: "DAST Scanner"