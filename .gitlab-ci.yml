# GitLab CI/CD - Simple Working Configuration
# Based on proven working template

stages:
  - build
  - test
  - deploy
  - dast
  - secret-detection

# Include GitLab's security templates
include:
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/DAST.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/SAST-IaC.gitlab-ci.yml

# Variables for DAST
variables:
  DAST_WEBSITE: "https://stormycloud.org"

# ============================================
# Build Job
# ============================================
build:
  stage: build
  image: alpine:latest
  before_script:
    - apk add --no-cache hugo git
  script:
    - hugo --config="config/config.toml" --gc --minify
    - cd public && tar -czf ../site.tar.gz * && cd ..
  artifacts:
    paths:
      - site.tar.gz
    expire_in: 1 day
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'

# ============================================
# Deploy Job
# ============================================
deploy:
  stage: test  # Using test stage to deploy before DAST runs
  image: alpine:latest
  dependencies:
    - build
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$I2P_SERVER_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -p $I2P_SERVER_PORT -H $I2P_SERVER_IP >> ~/.ssh/known_hosts
  script:
    - |
      echo "Deploying to production server..."
      ssh -p $I2P_SERVER_PORT $I2P_SERVER_USER@$I2P_SERVER_IP "sudo rm -rf /var/www/html/* && rm -f /tmp/site.tar.gz"
      scp -P $I2P_SERVER_PORT site.tar.gz $I2P_SERVER_USER@$I2P_SERVER_IP:/tmp/
      ssh -p $I2P_SERVER_PORT $I2P_SERVER_USER@$I2P_SERVER_IP "
        cd /tmp && 
        sudo tar -xzf site.tar.gz -C /var/www/html/ && 
        sudo chown -R www-data:www-data /var/www/html/ && 
        sudo chmod -R 755 /var/www/html/ && 
        rm -f site.tar.gz
      "
      echo "Deployment completed successfully!"
  environment:
    name: production
    url: https://stormycloud.org
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'

# Override DAST configuration
dast:
  stage: dast
  variables:
    DAST_SITE_PROFILE: "stormycloud"
    DAST_SCANNER_PROFILE: "DAST Scanner"
