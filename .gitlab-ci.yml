# GitLab CI/CD - Deployment Pipeline
# This file handles Hugo site building and deployment to I2P server

stages:
  - build
  - test
  - deploy

variables:
  HUGO_VERSION: "latest"

# Cache for faster builds
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .hugo_cache/
    - resources/
    - node_modules/

# ============================================
# Build Stage
# ============================================

build:hugo:
  stage: build
  image: 
    name: klakegg/hugo:ext-alpine
    entrypoint: [""]  # Override the entrypoint to allow shell commands
  script:
    - hugo version
    - hugo --config="config/config.toml" --gc --minify
    - cd public && tar -czf ../site.tar.gz * && cd ..
  artifacts:
    paths:
      - site.tar.gz
      - public/
    expire_in: 1 day
  only:
    - main
    - merge_requests

# ============================================
# Test Stage (Optional)
# ============================================

test:html-validation:
  stage: test
  image: 18fgsa/html-proofer:latest
  dependencies:
    - build:hugo
  script:
    - htmlproofer ./public --allow-hash-href --disable-external --empty-alt-ignore || true
  allow_failure: true
  only:
    - main
    - merge_requests

# ============================================
# Deploy Stage
# ============================================

deploy:production:
  stage: deploy
  image: alpine:latest
  dependencies:
    - build:hugo
  before_script:
    # Install SSH client
    - apk add --no-cache openssh-client
    # Setup SSH key
    - eval $(ssh-agent -s)
    - echo "$I2P_SERVER_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    # Add server to known hosts
    - ssh-keyscan -p $I2P_SERVER_PORT -H $I2P_SERVER_IP >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    # Clean remote directory
    - |
      ssh -p $I2P_SERVER_PORT $I2P_SERVER_USER@$I2P_SERVER_IP \
        "sudo rm -rf /var/www/html/* && rm -f /tmp/site.tar.gz"
    
    # Copy site archive to server
    - scp -P $I2P_SERVER_PORT site.tar.gz $I2P_SERVER_USER@$I2P_SERVER_IP:/tmp/
    
    # Extract and set permissions on server
    - |
      ssh -p $I2P_SERVER_PORT $I2P_SERVER_USER@$I2P_SERVER_IP \
        "cd /tmp && \
         sudo tar -xzf site.tar.gz -C /var/www/html/ && \
         sudo chown -R www-data:www-data /var/www/html/ && \
         sudo chmod -R 755 /var/www/html/ && \
         rm -f site.tar.gz"
    
    - echo "Deployment completed successfully!"
  environment:
    name: production
    url: https://stormycloud.org
  only:
    - main
  when: manual  # Remove this line for automatic deployment

# ============================================
# Alternative Deploy with Rsync (Optional)
# ============================================

deploy:production-rsync:
  stage: deploy
  image: alpine:latest
  dependencies:
    - build:hugo
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$I2P_SERVER_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -p $I2P_SERVER_PORT -H $I2P_SERVER_IP >> ~/.ssh/known_hosts
  script:
    # Sync files using rsync (more efficient for large sites)
    - |
      rsync -avz --delete \
        -e "ssh -p $I2P_SERVER_PORT" \
        public/ \
        $I2P_SERVER_USER@$I2P_SERVER_IP:/tmp/site-new/
    
    # Atomic deployment swap
    - |
      ssh -p $I2P_SERVER_PORT $I2P_SERVER_USER@$I2P_SERVER_IP \
        "sudo rm -rf /var/www/html.old && \
         sudo mv /var/www/html /var/www/html.old || true && \
         sudo mv /tmp/site-new /var/www/html && \
         sudo chown -R www-data:www-data /var/www/html/ && \
         sudo chmod -R 755 /var/www/html/"
  environment:
    name: production
    url: https://stormycloud.org
  only:
    - main
  when: manual


