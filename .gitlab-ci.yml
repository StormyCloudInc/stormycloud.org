# GitLab CI/CD - Deployment Pipeline (Working Version)
# Simplified and tested configuration

stages:
  - build
  - test
  - deploy

variables:
  HUGO_VERSION: "latest"

# Cache for faster builds
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .hugo_cache/
    - resources/

# ============================================
# Build Stage
# ============================================

build:hugo:
  stage: build
  image: alpine:latest
  before_script:
    # Install Hugo and Git (needed for git info in Hugo)
    - apk add --no-cache hugo git
    - hugo version
  script:
    # Build the Hugo site
    - hugo --config="config/config.toml" --gc --minify
    # Create deployment archive
    - cd public && tar -czf ../site.tar.gz * && cd ..
    - echo "Site built successfully!"
  artifacts:
    paths:
      - site.tar.gz
      - public/
    expire_in: 1 day
  only:
    - main
    - merge_requests

# ============================================
# Test Stage (Optional - can be removed if not needed)
# ============================================

test:basic-validation:
  stage: test
  image: alpine:latest
  dependencies:
    - build:hugo
  before_script:
    - apk add --no-cache curl
  script:
    # Basic checks to ensure build worked
    - test -f site.tar.gz || exit 1
    - test -d public || exit 1
    - test -f public/index.html || exit 1
    - echo "✓ Build artifacts verified"
    # Count files in public directory
    - echo "Files in build:" && find public -type f | wc -l
    # Check size of build
    - du -sh public/
  allow_failure: true
  only:
    - main
    - merge_requests

# Alternative HTML validation (using a different tool)
test:html-check:
  stage: test
  image: node:alpine
  dependencies:
    - build:hugo
  before_script:
    - npm install -g html-validator-cli
  script:
    - html-validator --file=public/index.html --verbose || true
  allow_failure: true
  only:
    - main
    - merge_requests
  when: manual  # Make this manual since it's optional

# ============================================
# Deploy Stage
# ============================================

deploy:production:
  stage: deploy
  image: alpine:latest
  dependencies:
    - build:hugo
  before_script:
    # Install SSH client
    - apk add --no-cache openssh-client
    # Setup SSH key
    - eval $(ssh-agent -s)
    - echo "$I2P_SERVER_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    # Add server to known hosts (disable strict checking for first run)
    - ssh-keyscan -p $I2P_SERVER_PORT -H $I2P_SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    # Test SSH connection first
    - |
      echo "Testing SSH connection..."
      ssh -p $I2P_SERVER_PORT $I2P_SERVER_USER@$I2P_SERVER_IP "echo 'SSH connection successful'"
    
    # Clean remote directory
    - |
      echo "Cleaning remote directory..."
      ssh -p $I2P_SERVER_PORT $I2P_SERVER_USER@$I2P_SERVER_IP \
        "sudo rm -rf /var/www/html/* && rm -f /tmp/site.tar.gz"
    
    # Copy site archive to server
    - |
      echo "Copying site archive to server..."
      scp -P $I2P_SERVER_PORT site.tar.gz $I2P_SERVER_USER@$I2P_SERVER_IP:/tmp/
    
    # Extract and set permissions on server
    - |
      echo "Extracting and setting permissions..."
      ssh -p $I2P_SERVER_PORT $I2P_SERVER_USER@$I2P_SERVER_IP \
        "cd /tmp && \
         sudo tar -xzf site.tar.gz -C /var/www/html/ && \
         sudo chown -R www-data:www-data /var/www/html/ && \
         sudo chmod -R 755 /var/www/html/ && \
         rm -f site.tar.gz && \
         echo 'Deployment completed!'"
    
    - echo "✓ Site deployed successfully to https://stormycloud.org"
  environment:
    name: production
    url: https://stormycloud.org
  only:
    - main
  when: manual  # Remove this line for automatic deployment

# ============================================
# Rollback Job (Optional but useful)
# ============================================

rollback:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$I2P_SERVER_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -p $I2P_SERVER_PORT -H $I2P_SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - |
      echo "Rolling back to previous version..."
      ssh -p $I2P_SERVER_PORT $I2P_SERVER_USER@$I2P_SERVER_IP \
        "if [ -d /var/www/html.old ]; then \
           sudo rm -rf /var/www/html && \
           sudo mv /var/www/html.old /var/www/html && \
           echo 'Rollback completed successfully'; \
         else \
           echo 'No backup found for rollback'; \
           exit 1; \
         fi"
  environment:
    name: production
    action: rollback
  only:
    - main
  when: manual