stages:
  - build
  - test
  - security
  - deploy

variables:
  HUGO_VERSION: "latest"
  DAST_WEBSITE: "https://stormycloud.org"
  # Security scanning variables
  SECURE_ANALYZERS_PREFIX: "registry.gitlab.com/security-products"
  SAST_EXCLUDED_PATHS: "spec, test, tests, tmp"
  SECRET_DETECTION_EXCLUDED_PATHS: ""

# Cache Hugo modules for faster builds
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .hugo_cache/
    - resources/
    - node_modules/

# ============================================
# Build Stage
# ============================================

build:hugo:
  stage: build
  image: klakegg/hugo:ext-alpine
  script:
    - hugo version
    - hugo --config="config/config.toml" --gc --minify
    - tar -czf site.tar.gz -C public .
  artifacts:
    paths:
      - public/
      - site.tar.gz
    expire_in: 1 week
  only:
    - main
    - merge_requests

# ============================================
# Test Stage
# ============================================

test:html:
  stage: test
  image: 18fgsa/html-proofer:latest
  dependencies:
    - build:hugo
  script:
    - htmlproofer ./public --allow-hash-href --disable-external --empty-alt-ignore || true
  allow_failure: true
  only:
    - main
    - merge_requests

# ============================================
# Security Scanning Stage
# ============================================

include:
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/SAST-IaC.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml

# DAST scanning with custom configuration
dast:
  stage: security
  inherit:
    default: false
  script:
    - echo "Running DAST scan on ${DAST_WEBSITE}"
  variables:
    DAST_WEBSITE: "https://stormycloud.org"
    DAST_FULL_SCAN_ENABLED: "true"
    DAST_BROWSER_SCAN: "true"
  needs: []
  dependencies: []
  only:
    - main
    - schedules
  allow_failure: true

# Override security job stages to fit our pipeline
dependency_scanning:
  stage: security
  needs: []

secret_detection:
  stage: security
  needs: []

sast:
  stage: security
  needs: []

sast-iac:
  stage: security
  needs: []

container_scanning:
  stage: security
  needs: ["build:hugo"]
  rules:
    - if: $CONTAINER_SCANNING_DISABLED
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ============================================
# Deploy Stage
# ============================================

deploy:i2p-server:
  stage: deploy
  image: alpine:latest
  dependencies:
    - build:hugo
  before_script:
    # Install required packages
    - apk add --no-cache openssh-client sshpass rsync
    # Setup SSH
    - eval $(ssh-agent -s)
    - echo "$I2P_SERVER_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -p $I2P_SERVER_PORT -H $I2P_SERVER_IP >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    # Clean remote directory
    - |
      ssh -p $I2P_SERVER_PORT $I2P_SERVER_USER@$I2P_SERVER_IP \
        "sudo rm -rf /var/www/html/* && rm -f /tmp/site.tar.gz"
    
    # Copy site archive to server
    - |
      scp -P $I2P_SERVER_PORT site.tar.gz \
        $I2P_SERVER_USER@$I2P_SERVER_IP:/tmp/
    
    # Extract and set permissions
    - |
      ssh -p $I2P_SERVER_PORT $I2P_SERVER_USER@$I2P_SERVER_IP \
        "cd /tmp && \
         sudo tar -xzf site.tar.gz -C /var/www/html/ && \
         sudo chown -R www-data:www-data /var/www/html/ && \
         sudo chmod -R 755 /var/www/html/ && \
         rm -f site.tar.gz"
  environment:
    name: production
    url: https://stormycloud.org
  only:
    - main
  when: manual  # Change to 'on_success' for automatic deployment

# Alternative deployment using rsync (more efficient for large sites)
deploy:i2p-server-rsync:
  stage: deploy
  image: alpine:latest
  dependencies:
    - build:hugo
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$I2P_SERVER_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -p $I2P_SERVER_PORT -H $I2P_SERVER_IP >> ~/.ssh/known_hosts
  script:
    # Use rsync for more efficient transfers
    - |
      rsync -avz --delete \
        -e "ssh -p $I2P_SERVER_PORT" \
        public/ \
        $I2P_SERVER_USER@$I2P_SERVER_IP:/tmp/site-new/
    
    # Atomic switch to new version
    - |
      ssh -p $I2P_SERVER_PORT $I2P_SERVER_USER@$I2P_SERVER_IP \
        "sudo rm -rf /var/www/html.old && \
         sudo mv /var/www/html /var/www/html.old || true && \
         sudo mv /tmp/site-new /var/www/html && \
         sudo chown -R www-data:www-data /var/www/html/ && \
         sudo chmod -R 755 /var/www/html/"
  environment:
    name: production-rsync
    url: https://stormycloud.org
  only:
    - main
  when: manual
  allow_failure: false

# ============================================
# Scheduled Jobs
# ============================================

# Weekly security scan
security:weekly-scan:
  stage: security
  inherit:
    default: false
  script:
    - echo "Running comprehensive security scan"
  only:
    - schedules
  variables:
    DAST_FULL_SCAN_ENABLED: "true"
    DEPENDENCY_SCANNING_DISABLED: "false"
    SAST_DISABLED: "false"
    SECRET_DETECTION_DISABLED: "false"

# ============================================
# Review Apps (Optional)
# ============================================

deploy:review:
  stage: deploy
  image: klakegg/hugo:ext-alpine
  script:
    - hugo --config="config/config.toml" --baseURL="https://$CI_ENVIRONMENT_SLUG.stormycloud.org" --gc --minify
    - echo "Deploy review app to $CI_ENVIRONMENT_SLUG"
  artifacts:
    paths:
      - public/
  environment:
    name: review/$CI_COMMIT_REF_NAME
    url: https://$CI_ENVIRONMENT_SLUG.stormycloud.org
    on_stop: stop:review
    auto_stop_in: 1 week
  only:
    - merge_requests
  except:
    - main
  when: manual

stop:review:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Stopping review app $CI_ENVIRONMENT_SLUG"
  environment:
    name: review/$CI_COMMIT_REF_NAME
    action: stop
  when: manual
  only:
    - merge_requests
  except:
    - main