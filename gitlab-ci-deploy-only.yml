# GitLab CI/CD - Just Deploy (No Security Scanning)
# Add security scanning in a separate scheduled pipeline if needed

stages:
  - build
  - deploy

# Build the Hugo site
build:
  stage: build
  image: alpine:latest
  script:
    - apk add --no-cache hugo git
    - hugo --config="config/config.toml" --gc --minify
    - cd public && tar -czf ../site.tar.gz * && cd ..
  artifacts:
    paths:
      - site.tar.gz
    expire_in: 1 day
  only:
    - main

# Deploy to production
deploy:
  stage: deploy
  image: alpine:latest
  dependencies:
    - build
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$I2P_SERVER_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -p $I2P_SERVER_PORT -H $I2P_SERVER_IP >> ~/.ssh/known_hosts
  script:
    - ssh -p $I2P_SERVER_PORT $I2P_SERVER_USER@$I2P_SERVER_IP "sudo rm -rf /var/www/html/*"
    - scp -P $I2P_SERVER_PORT site.tar.gz $I2P_SERVER_USER@$I2P_SERVER_IP:/tmp/
    - ssh -p $I2P_SERVER_PORT $I2P_SERVER_USER@$I2P_SERVER_IP "
        cd /tmp && 
        sudo tar -xzf site.tar.gz -C /var/www/html/ && 
        sudo chown -R www-data:www-data /var/www/html/ && 
        sudo chmod -R 755 /var/www/html/ && 
        rm -f site.tar.gz
      "
  environment:
    name: production
    url: https://stormycloud.org
  only:
    - main