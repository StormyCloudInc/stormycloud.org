{{ define "main" }}
  <style>
    @media (max-width: 900px) {
      .board-members {
        flex-direction: column;
        align-items: center;
        gap: 1.2rem;
        padding: 0 0.5rem 2rem 0.5rem;
      }
      .board-member {
        max-width: 98vw;
        padding: 1rem 0.2rem;
        margin: 0 auto;
      }
      .board-thumbnail {
        width: 90px !important;
        height: 90px !important;
      }
      .page-title {
        padding: 1.2rem 0.5rem 1rem 0.5rem;
      }
      .page-title h1 {
        font-size: 1.3rem;
      }
    }
    @media (max-width: 600px) {
      .board-member {
        padding: 0.7rem 0.1rem;
      }
      .board-thumbnail {
        width: 70px !important;
        height: 70px !important;
      }
      .page-title h1 {
        font-size: 1.1rem;
      }
    }
  </style>
  <div class="page-title" style="background-image: url('../images/board-title.webp');">
    <h1>{{ .Params.page_content.h1_Heading }}</h1>
  </div>
  <p></p>
 <div class="board-members">
  {{ with .Params.page_content.members }}
    {{ range . }}
        <div class="board-member">
          <img src="{{ .image }}" alt="Dustin Fields" class="board-thumbnail" width='150px' height='150px'>
          <div class="board-text">
            <h3>{{ .name }} - {{ .designation }}</h3>
            <p>{{ .details }}</p>
          </div>
        </div>
    {{ end }}
  {{ end }}
</div>
{{ end }}
