{{ define "main" }}
<style>
    .board-documents-section {
      margin: 20px 0;
      text-align: center;
    }

    .board-documents-section h2 {
      font-size: 1.8em;
      margin-bottom: 20px;
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
    }

    .board-documents-wrapper {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      padding: 0 10px;
    }

    .board-document-card {
      background-color: #2b3f88;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      padding: 20px;
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      color: #fff;
      text-decoration: none;
      cursor: pointer;
    }

    .board-document-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
    }

    .board-document-card img {
      width: 40px;
      height: 40px;
      margin-bottom: 10px;
    }

    .board-document-card span {
      display: block;
      margin-top: 10px;
      font-size: 1em;
      font-weight: bold;
      color: #fff;
    }

    .board-document-card:hover span {
      text-decoration: underline;
      color: #3cb7ff;
    }

    .iframe-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .iframe-wrapper {
      width: 90%;
      height: 90%;
      max-width: 1200px;
      max-height: 800px;
      background-color: #fff;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 24px;
      color: #333;
      text-decoration: none;
    }

    .iframe-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .iframe-container:target {
      display: flex;
    }

    @media (max-width: 768px) {
      .board-documents-wrapper {
        grid-template-columns: 1fr;
      }
    }
  </style>

      
      <div class="page-title" style="background-image: url('../images/document-title.webp');">
        <h1>Company Information</h1>
      </div>
      {{ with .Params.page_content.sections }}
        {{ range . }}
        <h2 class="line-short">{{ .title }}</h2>
        <p>{{ .text | markdownify }}</p>
        {{ end }}
      {{ end }}
      
    <div class="board-documents-section">
        <h2>Key Documents</h2>
        <div class="board-documents-wrapper">
          {{ with .Params.page_content.documents }}
            {{ range . }}
              <a title="{{ .title }}" href="#{{ .id }}" class="board-document-card">
                <img src="../images/document.svg" alt="Document Icon">
                <span>{{ .title }}</span>
              </a>
              <div id="{{ .id }}" class="iframe-container">
                <div class="iframe-wrapper">
                  <a title="{{ .title }}" href="#" class="close-btn">&times;</a>
                  <iframe src="{{ .link }}"></iframe>
                </div>
              </div>
            {{ end }}
          {{ end }}
        </div>
      </div>

          </div>
        </div>
      </div>
{{ end }}
