{{ define "main" }}
   <style>
    .styled-image {
      width: 100%; /* Adjust width as needed */
      max-width: 300px; /* Adjust max-width as needed */
    }
    .centeroutproxyimage {
  display: block;
  margin-left: auto;
  margin-right: auto;
  width: 80%;
}
  </style>
  <div class="page-title" style="background-image: url('../images/outproxy-title.webp');">
    <h1>{{ .Params.page_content.h1_Heading }}</h1>
  </div>
  <p></p>
    {{ with .Params.page_content.sections }}
      {{ range . }}
        <h2 class="line-short">{{ .title }}</h2>
        {{ .text | markdownify }}
      {{ end }}
  {{ end }}
<p><img src="{{ .Params.image | relURL }}" alt="{{ .Title }}" class="centeroutproxyimage"></p>
{{ end }}
