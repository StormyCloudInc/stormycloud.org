{{ define "main" }}
  <div class="page-title" style="background-image: url('../images/i2p-title.webp');">
    <h1>{{ .Params.page_content.h1_Heading }}</h1>
  </div>
  <br>
 <div class="board-members">
  {{ with .Params.page_content.sections }}
    {{ range . }}
        <div class="board-member">
          <img src="{{ .image }}" alt="{{ .alt }}" class="i2p-thumbnail">
          <div class="i2p-text">
            <p>{{ .details | safeHTML }}</p>
          </div>
        </div>
    {{ end }}
  {{ end }}
</div>
{{ end }}
