{{ define "main" }}
<style>
.author-posts {
  max-width: 800px;
  margin: 2rem auto;
  background: #181f33;
  border-radius: 12px;
  box-shadow: 0 4px 24px #0003;
  padding: 2rem 1.5rem;
  color: #f5f7fa;
}
.author-posts h1 {
  color: #3cb7ff;
  font-size: 2.2rem;
  margin-bottom: 1.5rem;
  text-align: center;
}
.author-posts ul {
  list-style: none;
  padding: 0;
  margin: 0;
}
.author-posts li {
  margin-bottom: 1.2rem;
  font-size: 1.15rem;
}
.author-posts a {
  color: #3cb7ff;
  text-decoration: none;
  font-weight: 700;
}
.author-posts a:hover {
  text-decoration: underline;
}
</style>
<section class="author-posts">
  <h1>Posts by {{ .Title }}</h1>
  <ul>
    {{ range .Pages }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <span style="color:#b0c4de; font-size:0.98em;">({{ .Date.Format "Jan 2, 2006" }})</span>
      </li>
    {{ end }}
  </ul>
</section>
{{ end }}
