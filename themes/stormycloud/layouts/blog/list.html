{{ define "main" }}
<style>
  .blog-listing {
    padding: 2rem 0;
    color: #f5f7fa;
    min-height: 100vh;
  }

  .blog-listing h1 {
    margin: 0 0 2.5rem;
    text-align: center;
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: 1px;
    color: #fff;
    text-shadow: 0 2px 8px #0006;
  }

  .blog-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2.5rem;
    justify-items: center;
  }

  @media (max-width: 1200px) {
    .blog-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 800px) {
    .blog-grid { grid-template-columns: 1fr; }
  }

  .blog-card {
    background: #19213a;
    border-radius: 16px;
    overflow: hidden;
    width: 100%;
    box-shadow: 0 4px 24px #0003;
    text-decoration: none;
    transition: transform 0.18s, box-shadow 0.18s;
    display: flex;
    flex-direction: column;
    min-height: 420px;
  }

  .blog-card:hover {
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 8px 32px #0005;
  }

  .blog-card-img-link {
    display: block;
  }

  .blog-card-img img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-bottom: 1px solid #2b3f88;
    background: #222b44;
    display: block;
  }

  .blog-card-body {
    padding: 1.5rem 1.25rem;
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    line-height: 1.4;
  }

  .blog-card-body h2 {
    font-size: 1.35rem;
    font-weight: 700;
    margin: 0;
    color: #fff;
    text-shadow: 0 1px 4px #0003;
  }
  
  .blog-card-body h2::after {
    content: '';
    display: block;
    /* FIX #1: Line is now full width */
    width: 100%;
    height: 2px;
    background: #fff;
    margin-top: 0.6rem; 
    margin-bottom: 1.25rem;
  }

  .blog-card-body h2 a {
    text-decoration: none;
    color: inherit;
  }

  .blog-card-body p {
    color: #e0e6f0;
    font-size: 1rem;
    margin: 0 0 1.2rem 0;
    min-height: 60px;
    /* flex-grow removed to simplify the CSS, as margin-top on the button does the work */
  }

  .read-more {
    background: linear-gradient(90deg, #3cb7ff 0%, #2b3f88 100%);
    color: #fff !important;
    font-weight: 700;
    padding: 10px 28px;
    display: inline-block;
    border-radius: 6px;
    text-decoration: none;
    font-size: 1rem;
    box-shadow: 0 2px 8px #0002;
    transition: background 0.18s, color 0.18s;
    letter-spacing: 0.5px;
    margin-top: auto;
    align-self: flex-start;
  }

  .read-more:hover {
    background: linear-gradient(90deg, #2b3f88 0%, #3cb7ff 100%);
    color: #fff;
  }

  @media (max-width: 900px) {
    .blog-card { width: 100%; max-width: 370px; }
  }
  .blog-card p{
font-size: 17px; font-weight: 400; text-align:left
}
</style>

<section class="blog-listing">
  <div class="blog-grid">
    {{ range .Pages }}
      <article class="blog-card">
        <a href="{{ .RelPermalink }}" class="blog-card-img-link">
          <div class="blog-card-img">
            {{ with .Resources.GetMatch .Params.featured_image }}
              <img src="{{ .RelPermalink }}" alt="{{ $.Title }}">
            {{ else }}
              <img src="/default-image.jpg" alt="Default image">
            {{ end }}
          </div>
        </a>
        <div class="blog-card-body">
          <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
          <p>{{ .Content | plainify | truncate 150 }}</p>
          <a class="read-more" href="{{ .RelPermalink }}">Read More</a>
        </div>
      </article>
    {{ end }}
  </div>
</section>
{{ end }}
