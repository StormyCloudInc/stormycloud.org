<header id="site-header">
  <div class="nav-inner">
    <!-- Logo -->
    {{- $logo := resources.Get "images/stormycloud.svg" -}}
    <a href="/" class="nav-logo" title="StormyCloud Inc">
      <img src="{{ $logo.RelPermalink }}" alt="StormyCloud Inc" width="230" height="22" loading="eager">
    </a>

    <!-- Right: nav + controls -->
    <div class="nav-right">
      <nav aria-label="Main navigation">
        <ul>
          {{- $currentPage := . -}}
          {{- range .Site.Menus.main }}
          {{- if .HasChildren }}
          <li class="dropdown">
            <a href="{{ .URL }}" title="{{ .Name }}">{{ .Name }}</a>
            <div class="dropdown-content">
              {{- range .Children }}
              <a href="{{ .URL }}" title="{{ .Name }}"{{ with .Pre }} target="{{ . }}"{{ end }}>{{ .Name }}</a>
              {{- end }}
            </div>
          </li>
          {{- else }}
          <li>
            <a href="{{ .URL }}" title="{{ .Name }}"{{ with .Pre }} target="{{ . }}"{{ end }}{{ if eq .Name "Donate" }} class="nav-donate"{{ end }}>{{ .Name }}</a>
          </li>
          {{- end }}
          {{- end }}
        </ul>
      </nav>

      <!-- Theme toggle -->
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark theme" title="Toggle theme">
        <!-- Moon icon (shown in dark mode) -->
        <svg class="theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <!-- Sun icon (shown in light mode) -->
        <svg class="theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>

      <!-- Mobile hamburger -->
      <button class="nav-toggle" id="nav-toggle" aria-label="Open navigation menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>

<script>
(function(){
  // Scroll: darken nav on scroll
  var hdr = document.getElementById('site-header');
  window.addEventListener('scroll', function(){
    hdr.style.borderBottomColor = window.scrollY > 40 ? 'var(--border-hi)' : '';
  }, {passive: true});

  // Mobile hamburger
  var navToggle = document.getElementById('nav-toggle');
  navToggle.addEventListener('click', function(){
    var open = hdr.classList.toggle('nav-open');
    navToggle.setAttribute('aria-expanded', open);
  });

  // Theme toggle
  document.getElementById('theme-toggle').addEventListener('click', function(){
    var html = document.documentElement;
    var next = html.dataset.theme === 'light' ? 'dark' : 'light';
    html.dataset.theme = next;
    localStorage.setItem('sc-theme', next);
  });
})();
</script>
