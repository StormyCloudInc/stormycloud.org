<div class="img-{{ .Get " align" }}">
  {{- $src := .Get "src" -}}
  {{- $image := .Page.Resources.GetMatch $src -}}
  {{- if $image -}}
  {{- $webp := $image.Resize "800x webp" -}}
  <img src="{{ $webp.RelPermalink }}" alt="{{ .Get " alt" }}" width="{{ $webp.Width }}" height="{{ $webp.Height }}"
    loading="lazy">
  {{- else -}}
  <img src="{{ $src | relURL }}" alt="{{ .Get " alt" }}" loading="lazy">
  {{- end -}}
</div>
